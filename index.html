<!DOCTYPE html>
<html>
<head>
  <title>Bharat Finance AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Bharat Finance AI</h1>
  <select id="mode">
    <option>Investing</option>
    <option>Tax</option>
    <option>Startup</option>
  </select>
  <div id="chatBox"></div>
  <input id="input" placeholder="Ask something...">
  <button onclick="sendMsg()">Send</button>
  <h3>PPF Calculator</h3>
  <input id="amount" placeholder="Amount">
  <input id="rate" placeholder="Rate (%)">
  <input id="years" placeholder="Years">
  <button onclick="calcPPF()">Calculate</button>
  <div id="ppfResult"></div>
</div>
<script src="script.js"></script>
</body>
</html>
