<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bharat Finance AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
  <h1>Bharat Finance AI</h1>
  <div class="card">
    <select id="mode">
      <option>Investing</option>
      <option>Tax</option>
      <option>Startup</option>

    <div id="chatBox"></div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
