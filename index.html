<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bharat Finance AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Bharat Finance AI</h1>

  <select id="mode">
    <option>Investing</option>
    <option>Tax</option>
    <option>Startup</option>
  </select>

  <div id="chatBox"></div>

  <form id="chat-form">
    <input id="input" placeholder="Ask something..." autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <!-- PPF CALCULATOR -->
  <h3>PPF Calculator</h3>

  <input id="amount" placeholder="Annual Investment (₹)">
  <input id="rate" placeholder="Interest Rate (%)">
  <input id="years" placeholder="Years">

  <button onclick="calcPPF()">Calculate</button>

  <div id="ppfResult"></div>
</div>

<script src="script.js"></script>
</body>
</html>
